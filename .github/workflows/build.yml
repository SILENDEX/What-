name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install cmake make g++ libsdl2-dev libsdl2-image-dev -y

      - name: Build game
        run: |
          rm -rf build
          mkdir build
          cd build
          cmake ..
          make

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: What
          path: build/what
